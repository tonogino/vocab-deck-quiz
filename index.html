<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>索菲亚单词小屋</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/features.css" />
</head>
<body>
  <main id="app" class="app">
    <section id="startScreen" class="screen active">
      <div class="start-card">
        <div class="language-control">
          <label for="languageSelect" data-i18n="ui.language">语言</label>
          <select id="languageSelect">
            <option value="zh">中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
          </select>
        </div>
        <div class="game-logo">
          <p class="logo-kana">ことばの部屋</p>
          <h1 data-i18n="ui.title">索菲亚单词小屋</h1>
          <p data-i18n="ui.subtitle">Vocabulary Galgame · Version 2</p>
        </div>
        <section class="mode-picker" aria-label="Game mode">
          <button id="normalModeBtn" class="mode-card selected" type="button">
            <strong data-i18n="ui.normalMode">普通模式</strong>
            <span data-i18n="ui.normalModeDescription">完全离线，不消耗 API。</span>
          </button>
          <button id="advancedModeBtn" class="mode-card advanced" type="button">
            <strong data-i18n="ui.advancedMode">高级模式：API 消耗模式</strong>
            <span data-i18n="ui.advancedModeDescription">启用 AI 索菲亚、对话与本地记忆。</span>
          </button>
        </section>
        <p id="modeNotice" class="mode-notice"></p>
        <div class="start-grid">
          <section class="panel-card">
            <div class="section-title-row">
              <h2 data-i18n="ui.selectSave">选择存档</h2>
              <button id="createSaveBtn" type="button" data-i18n="ui.newSave">新建存档</button>
            </div>
            <div id="saveSlotList" class="save-slot-list"></div>
          </section>
          <section class="panel-card">
            <h2 data-i18n="ui.instructions">说明</h2>
            <p class="help-text" data-i18n="ui.help1"></p>
            <p class="help-text" data-i18n="ui.help2"></p>
          </section>
        </div>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <section class="left-panel">
        <header class="top-bar">
          <div>
            <p class="logo-kana small">ことばの部屋</p>
            <h1 data-i18n="ui.title">索菲亚单词小屋</h1>
            <p id="currentSaveName"></p>
          </div>
          <div class="top-actions">
            <select id="gameLanguageSelect" class="game-language-select" aria-label="Language">
              <option value="zh">中文</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
            </select>
            <button id="eventBtn" type="button" data-i18n="ui.events">好感度事件</button>
            <button id="settingsBtn" class="secondary-btn hidden" type="button" data-i18n="ui.settings">设置</button>
            <button id="libraryBtn" class="secondary-btn" type="button" data-i18n="ui.libraries">词库管理</button>
            <button id="characterBtn" class="secondary-btn" type="button" data-i18n="ui.characters">管理角色</button>
            <button id="backToStartBtn" class="secondary-btn" type="button" data-i18n="ui.backToTitle">返回标题</button>
          </div>
        </header>
        <section class="status-card">
          <div><span class="label" data-i18n="ui.character">角色</span><strong id="characterName"></strong></div>
          <div><span class="label" data-i18n="ui.affection">好感度</span><strong><span id="affectionValue">0</span> / 100</strong></div>
          <div><span class="label" data-i18n="ui.relationship">关系</span><strong id="affectionLevel"></strong></div>
        </section>
        <section class="study-card">
          <div class="progress-row"><span id="wordCounter">Word 1 / 1</span><span id="correctRate"></span></div>
          <article class="word-box">
            <p class="small-title" data-i18n="ui.prompt"></p>
            <h2 id="wordText">loading</h2>
            <p id="wordHint"></p>
          </article>
          <div class="answer-row">
            <input id="answerInput" type="text" data-i18n-placeholder="ui.answerPlaceholder" autocomplete="off" />
            <button id="submitBtn" type="button" data-i18n="ui.submit">确认</button>
          </div>
          <div class="button-row">
            <button id="showAnswerBtn" class="secondary-btn" type="button" data-i18n="ui.showAnswer">查看答案</button>
            <button id="nextBtn" class="secondary-btn" type="button" data-i18n="ui.next">下一个</button>
          </div>
          <p id="feedbackText" class="feedback">准备开始吧。</p>
        </section>
      </section>
      <section class="right-panel">
        <div class="character-stage"><img id="characterImage" src="./characters/sophia/images/normal.png" alt="Sophia" /></div>
        <section class="dialogue-box">
          <div class="speaker-row"><strong id="speakerName">索菲亚</strong><span data-i18n="ui.clickCharacter">点击角色互动</span></div>
          <p id="dialogueText"></p>
        </section>
        <section id="aiChatPanel" class="ai-chat-panel hidden">
          <div class="ai-chat-header">
            <strong data-i18n="ui.chatWithSophia">与索菲亚对话</strong>
            <span id="aiStatusText" data-i18n="ui.aiReady">AI 模式</span>
          </div>
          <div id="aiChatLog" class="ai-chat-log" aria-live="polite"></div>
          <div class="ai-chat-input-row">
            <textarea id="aiChatInput" rows="2" data-i18n-placeholder="ui.chatPlaceholder"></textarea>
            <button id="aiSendBtn" type="button" data-i18n="ui.send">发送</button>
          </div>
        </section>
      </section>
    </section>

    <section id="settingsScreen" class="screen">
      <div class="management-card">
        <div class="management-header">
          <div>
            <p class="logo-kana small">AI SETTINGS</p>
            <h1 data-i18n="ui.settings">设置</h1>
            <p data-i18n="ui.apiSettingsDescription"></p>
          </div>
          <button id="closeSettingsBtn" class="secondary-btn" type="button" data-i18n="ui.backToMain">回到主界面</button>
        </div>
        <div class="management-grid">
          <section class="panel-card">
            <h2 data-i18n="ui.apiConfiguration">API 配置</h2>
            <div class="form-stack">
              <label for="apiKeyInput" data-i18n="ui.apiKey">API Key</label>
              <input id="apiKeyInput" type="password" autocomplete="off" placeholder="sk-..." />
              <label for="apiTypeSelect" data-i18n="ui.apiType">接口类型</label>
              <select id="apiTypeSelect">
                <option value="chat_completions" data-i18n="ui.apiTypeCompatible">OpenAI 兼容 / Chat Completions</option>
                <option value="responses" data-i18n="ui.apiTypeResponses">OpenAI Responses</option>
              </select>
              <label for="apiModelInput" data-i18n="ui.apiModel">模型</label>
              <input id="apiModelInput" type="text" value="[m1]claude-sonnet-4-6" />
              <label for="apiBaseUrlInput" data-i18n="ui.apiBaseUrl">API 地址</label>
              <input id="apiBaseUrlInput" type="url" value="https://pro.mmw.ink/v1" />
              <div class="button-row">
                <button id="saveApiSettingsBtn" type="button" data-i18n="ui.saveSettings">保存设置</button>
                <button id="testApiBtn" class="secondary-btn" type="button" data-i18n="ui.testApi">测试 API</button>
              </div>
              <p id="apiTestStatus" class="transfer-status" aria-live="polite"></p>
              <p class="security-warning" data-i18n="ui.apiSecurityWarning"></p>
            </div>
          </section>
          <section class="panel-card">
            <h2 data-i18n="ui.userMemory">User.md 记忆</h2>
            <p class="help-text" data-i18n="ui.userMemoryDescription"></p>
            <textarea id="userMemoryInput" class="memory-editor" rows="12"></textarea>
            <div class="button-row">
              <button id="saveUserMemoryBtn" type="button" data-i18n="ui.saveMemory">保存记忆</button>
              <button id="clearChatBtn" class="secondary-btn" type="button" data-i18n="ui.clearChat">清空对话</button>
            </div>
          </section>
        </div>
      </div>
    </section>

    <section id="libraryScreen" class="screen">
      <div class="management-card">
        <div class="management-header">
          <div><p class="logo-kana small">ことばリスト</p><h1 data-i18n="ui.libraryTitle">词库管理</h1><p data-i18n="ui.libraryDescription"></p></div>
          <button id="closeLibraryBtn" class="secondary-btn" type="button" data-i18n="ui.backToMain">回到主界面</button>
        </div>
        <div class="management-grid">
          <section class="panel-card"><h2 data-i18n="ui.enabledLibraries"></h2><div id="librarySelectList" class="library-select-list"></div><p id="libraryHint" class="help-text"></p></section>
          <section class="panel-card"><h2 data-i18n="ui.createLibrary"></h2><div class="form-stack"><input id="newLibraryNameInput" type="text" data-i18n-placeholder="ui.libraryNamePlaceholder" /><button id="createLibraryBtn" type="button" data-i18n="ui.create">创建词库</button></div></section>
          <section class="panel-card wide">
            <h2 data-i18n="ui.libraryBackup">本地词库备份</h2>
            <p class="help-text" data-i18n="ui.libraryBackupDescription"></p>
            <div class="button-row">
              <button id="exportLibrariesBtn" type="button" data-i18n="ui.exportLibraries">导出自创词库</button>
              <button id="importLibrariesBtn" class="secondary-btn" type="button" data-i18n="ui.importLibraries">导入词库文件</button>
              <input id="libraryFileInput" class="hidden" type="file" accept=".json,.js,application/json,text/javascript" />
            </div>
            <p id="libraryTransferStatus" class="transfer-status" aria-live="polite"></p>
          </section>
          <section class="panel-card wide"><h2 data-i18n="ui.addWords"></h2><div class="form-grid"><select id="wordLibrarySelect"></select><input id="newWordInput" type="text" data-i18n-placeholder="ui.wordPlaceholder" /><input id="newAnswerInput" type="text" data-i18n-placeholder="ui.answerListPlaceholder" /><input id="newHintInput" type="text" data-i18n-placeholder="ui.hintPlaceholder" /><button id="addWordBtn" type="button" data-i18n="ui.addToLibrary">加入词库</button></div></section>
          <section class="panel-card wide"><h2 data-i18n="ui.libraryContents"></h2><div id="libraryWordList" class="library-word-list"></div></section>
        </div>
      </div>
    </section>

    <section id="characterScreen" class="screen">
      <div class="management-card">
        <div class="management-header">
          <div><p class="logo-kana small">キャラクター</p><h1 data-i18n="ui.characterManagement">角色管理</h1><p data-i18n="ui.characterDescription"></p></div>
          <button id="closeCharacterBtn" class="secondary-btn" type="button" data-i18n="ui.backToMain">回到主界面</button>
        </div>
        <div class="character-management-grid">
          <section class="panel-card selected-character-panel">
            <h2 data-i18n="ui.selectedCharacter">当前角色</h2>
            <img id="selectedCharacterImage" src="./characters/sophia/images/normal.png" alt="Sophia" />
            <h3 id="selectedCharacterName">索菲亚</h3>
            <p id="selectedCharacterDescription" class="help-text"></p>
            <div id="personalityFilePanel" class="personality-file-panel hidden">
              <strong data-i18n="ui.personalityProfile">AI 人设文件</strong>
              <p id="personalityFileName" class="help-text"></p>
              <button id="selectPersonalityFileBtn" class="secondary-btn" type="button" data-i18n="ui.selectPersonalityFile">选择 Markdown 人设</button>
              <button id="resetPersonalityFileBtn" class="secondary-btn" type="button" data-i18n="ui.resetPersonalityFile">恢复默认人设</button>
              <input id="personalityFileInput" class="hidden" type="file" accept=".md,.markdown,text/markdown,text/plain" />
              <p id="personalityFileStatus" class="transfer-status" aria-live="polite"></p>
            </div>
          </section>
          <section class="panel-card">
            <h2 data-i18n="ui.availableCharacters">可选择角色</h2>
            <div id="characterSelectList" class="character-select-list"></div>
          </section>
        </div>
      </div>
    </section>

    <section id="eventScreen" class="screen">
      <div class="event-layout">
        <section id="eventListPanel" class="panel-card event-list-panel">
          <div class="management-header compact"><div><p class="logo-kana small">きずなイベント</p><h1 data-i18n="ui.eventTitle">好感度事件</h1><p data-i18n="ui.eventDescription"></p></div><button id="closeEventBtn" class="secondary-btn" type="button" data-i18n="ui.backToMain">回到主界面</button></div>
          <div id="eventList" class="event-list"></div>
        </section>
        <section id="eventPlayPanel" class="event-play-panel hidden">
          <div class="event-scene"><img id="eventCharacterImage" src="./characters/sophia/images/normal.png" alt="Sophia" /></div>
          <div class="event-dialogue-box">
            <div class="speaker-row"><strong id="eventSpeakerName">索菲亚</strong><span id="eventProgressText">Event</span></div>
            <p id="eventDialogueText"></p>
            <div class="button-row"><button id="eventNextLineBtn" type="button" data-i18n="ui.continue">继续</button><button id="eventExitBtn" class="secondary-btn" type="button" data-i18n="ui.exitEvent">中途退出</button></div>
          </div>
        </section>
      </div>
    </section>
  </main>
  <script src="./data/language.js"></script>
  <script src="./data/characters.js"></script>
  <script src="./data/vocab-libraries.js"></script>
  <script src="./data/events.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
